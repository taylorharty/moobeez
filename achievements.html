<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Moobies!</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="css/style.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" rel="stylesheet">
</head>
<body>

<div id="app">

<nav class="navbar">
    <div class="container-fluid mx-3">
        <a class="navbar-brand" href="#">Moobeez! 🐄🐝</a>
    </div>
</nav>


<div class="" id="page">

    <!-- Navbar -->

    <div class="row">
        <side-nav current-page="achievements.html"></side-nav>

        <div class="col-12 col-md-9 pt-3 px-4" id="content">
            <div class="container my-3">
                <h3>My Achievements</h3>
                <div class="row g-3">
                    <div class="col-12 col-md-3" v-for="achievement in earnedAchievements" :key="achievement.name">
                        <a href="#">
                        <div class="card h-100 my-2">
                                <img :src="achievement.image" class="card-img-top" alt="">
                                <div class="card-body">
                                    <p class="card-text">{{ achievement.name }}<br>
                                        {{ achievement.description }}</p>
                                </div>
                        </div>
                        </a>
                    </div>
                </div>

            </div>

            <div class="container my-4" v-if="unearnedAchievements.length > 0">
                <h3>Stuff to Get!</h3>
                <div class="row g-3 locked-card">
                    <div class="col-12 col-md-3" v-for="achievement in unearnedAchievements" :key="achievement.name">
                        <a href="#" @click="selectedAchievement = achievement"
                           data-bs-toggle="modal" data-bs-target="#unachieved">
                        <div class="card h-100 my-2">
                            <img :src="achievement.image" class="card-img-top" alt="">
                            <div class="card-body">
                                <p class="card-text">{{ achievement.name }}<br>
                                    {{ achievement.description }}</p>
                            </div>
                        </div>
                        </a>
                    </div>
                </div>

            </div>
        </div>

    </div>

</div>


<div class="modal fade" id="makeBadgeModal" tabindex="-1" aria-labelledby="makeBadgeModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="makeBadgeModalLabel">Make Achievement</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>

            <form id="make-badge-form" @submit.prevent="addAchievement()">
                <div class="modal-body">
                    <div class="mb-3">
                        <label for="achievement-name" class="form-label">Achievement Name</label>
                        <input
                                type="text"
                                class="form-control"
                                id="achievement-name"
                                name="achievementName"
                                placeholder="e.g., Horror Week"
                                required
                                v-model="newAchievement.name"
                        />
                    </div>

                    <div class="mb-3">
                        <label for="achievement-requirements" class="form-label">Achievement Requirements</label>
                        <textarea
                                class="form-control"
                                id="achievement-requirements"
                                name="achievementRequirements"
                                rows="3"
                                placeholder="e.g., Watch 5 horror movies"
                                required
                                v-model="newAchievement.description"
                        ></textarea>
                    </div>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-primary" id="make-badge-submit">Create</button>
                </div>
            </form>
        </div>
    </div>
</div>

    <div class="modal fade" id="unachieved" tabindex="-1" aria-labelledby="unachievedModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-body d-flex gap-2">
                    <button type="button" class="m-2 btn btn-danger flex-fill"
                            @click="deleteAchievement(selectedAchievement.name)"
                            data-bs-dismiss="modal">Delete
                    </button>
                    <button type="button" class="m-2 btn btn-secondary flex-fill" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="m-2 btn btn-primary flex-fill"
                            @click="earnAchievement(selectedAchievement.name)"
                            data-bs-dismiss="modal">Get Achievement!</button>
                </div>
            </div>
        </div>
    </div>

<footer class="bg-dark">
    <div class="container text-center py-3">
        <p class="mb-0">&copy; 2026 Moobeez! Copyleft maybe?!</p>
    </div>
</footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
<script type="module">
    // create the app
    import app from './js/app.js';

    // tell it to run on the div #app
    app.mount('#app');
</script>
</body>
</html>
