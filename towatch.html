<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Moobies!</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="css/style.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" rel="stylesheet">
</head>
<body>

<div id="app">

    <nav class="navbar">
        <div class="container-fluid mx-3">
            <a class="navbar-brand" href="#">Moobeez! 🐄🐝</a>
        </div>
    </nav>


    <div class="" id="page">

        <div class="row">
            <side-nav current-page="towatch.html"></side-nav>

            <div class="col-12 col-md-9 pt-3 px-4" id="content">
                <div class="container rounded border p-3 my-3">
                    <h2 class="h3 mb-3">To Watch</h2>
                    <movie-list-grid
                            :movies="unwatchedMovies"
                            @remove-movie="removeMovie"
                            @mark-watched="markAsWatched"
                    ></movie-list-grid>
                </div>
            </div>

        </div>

    </div>

    <div class="modal fade" id="searchMovieModal" tabindex="-1" aria-labelledby="searchMovieModalLabel"
         aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="searchMovieModalLabel">Add Movie to Watch List</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"
                            aria-label="Close"></button>
                </div>
                <form id="search-movie-form" @submit.prevent="addMovieToList()">
                    <div class="modal-body">
                        <div class="mb-3">
                            <label for="movie-title" class="form-label">Title</label>
                            <input type="text" class="form-control" id="movie-title"
                                   placeholder="Enter movie title" v-model="newMovie.name">
                        </div>
                        <div class="mb-3">
                            <label for="movie-year" class="form-label">Year</label>
                            <input type="number" class="form-control" id="movie-year"
                                   placeholder="Enter release year" v-model="newMovie.year">
                        </div>
                        <div class="mb-3">
                            <label for="movie-director" class="form-label">Director</label>
                            <input type="text" class="form-control" id="movie-director"
                                   placeholder="Enter director name" v-model="newMovie.director">
                        </div>
                        <div class="mb-3">
                            <label for="movie-genre" class="form-label">Genre</label>
                            <input type="text" class="form-control" id="movie-genre"
                                   placeholder="Enter movie genre" v-model="newMovie.genres">
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-primary" id="search-movie-submit">Add Movie To Watch
                            List...
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div class="modal fade" id="watchedMovieModal" tabindex="-1" aria-labelledby="watchedMovieModalLabel"
         aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="watchedMovieModalLabel">Mark as Watched</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"
                            aria-label="Close"></button>
                </div>

                <form @submit.prevent="saveWatchedDetails()">
                    <div class="modal-body">
                        <div class="mb-2">
                            <b>{{ watchedDraft.name }}</b>
                            <div>
                                {{ watchedDraft.year }} - {{ watchedDraft.director }}
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="watched-description" class="form-label">Description</label>
                            <textarea
                                    id="watched-description"
                                    class="form-control"
                                    rows="5"
                                    placeholder="What is this movie about?"
                                    v-model.trim="watchedDraft.description"
                            ></textarea>
                        </div>

                        <div class="mb-3">
                            <label for="watched-main-thought" class="form-label">Final Thought</label>
                            <textarea
                                    id="watched-main-thought"
                                    class="form-control"
                                    rows="3"
                                    placeholder="Your main takeaway"
                                    v-model.trim="watchedDraft.mainThought"
                            ></textarea>
                        </div>
                    </div>

                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-primary">Save and Mark Watched</button>
                    </div>
                </form>
            </div>
        </div>
    </div>


    <footer class="bg-dark">
        <div class="container text-center py-3">
            <p class="mb-0">&copy; 2026 Moobeez! Copyleft maybe?!</p>
        </div>
    </footer>

</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
<script type="module">
    // create the app
    import app from './js/app.js';

    // tell it to run on the div #app
    app.mount('#app');
</script>
</body>
</html>
